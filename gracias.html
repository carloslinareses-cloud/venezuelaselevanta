<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Gracias por tu donación! — Venezuela se Levanta</title>
  <meta name="description" content="Gracias por ayudar a las familias afectadas por el terremoto en Venezuela." />
  <meta name="theme-color" content="#0a2540" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .gracias { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
      background: radial-gradient(900px 500px at 50% -10%, rgba(245,167,35,.18), transparent 60%), var(--crema); padding: 40px 20px; }
    .gracias-card { max-width: 560px; }
    .gracias .check { width: 96px; height: 96px; margin: 0 auto 24px; border-radius: 50%; background: linear-gradient(135deg, var(--oro-400), var(--oro-600)); display: grid; place-items: center; box-shadow: var(--sombra-lg); animation: pop .5s cubic-bezier(.2,.9,.3,1.3); }
    .gracias .check svg { width: 48px; height: 48px; }
    .gracias h1 { margin-bottom: 14px; }
    .gracias p { color: var(--gris-700); font-size: 1.1rem; margin-bottom: 10px; }
    .gracias .share { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    @keyframes pop { from { transform: scale(.6); opacity: 0; } }
  </style>
</head>
<body>
  <div class="gracias">
    <div class="gracias-card">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a2540" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <span class="kicker">Donación recibida</span>
      <h1>¡Gracias por tu corazón! 💛</h1>
      <p>Tu aporte ya está en camino para ayudar a las familias afectadas por el terremoto.</p>
      <p>Si dejaste tu correo, recibirás un comprobante en breve.</p>
      <div class="share">
        <a href="index.html" class="btn btn-primary btn-lg">Volver al inicio</a>
        <a href="index.html#donar" class="btn btn-ghost btn-lg">Compartir la causa</a>
      </div>
      <p style="margin-top:26px;font-family:var(--font-display);font-size:1.3rem;color:var(--azul-900)">Juntos, Venezuela se levanta.</p>
    </div>
  </div>
</body>
</html>
